<title>Carely Career — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --blue: #95A9C6; --blue-light: #C0D3E7; --blue-bg: #dce6ef;
  --cream: #faf9f5; --stone: #E0DCD1; --bear: #D8D1C3;
  --viridian: #344945; --text: #2c3830; --muted: #6b7a6e;
  --border: #d4cfc6; --white: #fff; --txt-light: #f9f8f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

.header { background: var(--blue); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.header-logo { height: 70px; }
.header-div { width: 1px; height: 36px; background: rgba(255,255,255,0.3); }
.header-title { font-size: 15px; font-weight: 800; color: var(--txt-light); }
.header-badge { margin-left: auto; background: var(--viridian); color: white; border-radius: 8px; padding: 5px 14px; font-size: 13px; font-weight: 700; }

main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: white; border-radius: 14px; border: 1.5px solid var(--border); padding: 18px 20px; }
.stat-num { font-size: 30px; font-weight: 900; color: var(--blue); }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 600; }

.filter-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
.filter-select { padding: 9px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'Sarabun',sans-serif; font-size: 14px; background: white; outline: none; color: var(--text); }
.btn-refresh { padding: 9px 18px; background: var(--blue-bg); border: 1.5px solid var(--blue-light); border-radius: 10px; font-family: 'Sarabun',sans-serif; font-size: 14px; font-weight: 700; color: var(--viridian); cursor: pointer; }

.applicant-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 16px; }
.app-card { background: white; border-radius: 16px; border: 1.5px solid var(--border); overflow: hidden; transition: all 0.2s; }
.app-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.07); transform: translateY(-2px); }
.app-card-header { background: var(--blue-bg); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.app-photo { width: 50px; height: 50px; border-radius: 50%; background: var(--blue-light); object-fit: cover; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid white; }
.app-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.app-name { font-size: 15px; font-weight: 800; color: var(--viridian); }
.app-prof { font-size: 12px; color: var(--muted); margin-top: 2px; }
.app-ref { font-size: 11px; color: var(--muted); margin-top: 1px; }
.app-body { padding: 13px 16px; }
.app-row { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
.app-label { color: var(--muted); font-weight: 600; }
.app-val { font-weight: 600; text-align: right; }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag { background: var(--blue-bg); color: var(--viridian); border-radius: 6px; padding: 2px 8px; font-size: 11.5px; font-weight: 600; }
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }
.s-wait { background: #fef9e7; color: #92400e; }
.s-ok { background: #dcfce7; color: #14532d; }
.s-no { background: #fee2e2; color: #991b1b; }
.app-footer { padding: 10px 16px; border-top: 1px solid var(--stone); display: flex; gap: 7px; }
.btn-view { flex: 1; padding: 8px; background: var(--blue); color: white; border: none; border-radius: 8px; font-family: 'Sarabun',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-approve { flex: 1; padding: 8px; background: #dcfce7; color: #14532d; border: 1.5px solid #86efac; border-radius: 8px; font-family: 'Sarabun',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-reject { padding: 8px 12px; background: #fee2e2; color: #991b1b; border: 1.5px solid #fecdd3; border-radius: 8px; font-family: 'Sarabun',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; overflow-y: auto; padding: 20px; }
.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal { background: white; border-radius: 20px; max-width: 700px; width: 100%; padding: 28px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: var(--stone); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }
.modal-title { font-size: 19px; font-weight: 800; color: var(--viridian); margin-bottom: 20px; }
.modal-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.modal-tab { padding: 9px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: none; font-family: 'Sarabun',sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; }
.modal-tab.active { background: var(--blue); color: white; border-color: var(--blue); }
.modal-panel { display: none; }
.modal-panel.active { display: block; }

.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--stone); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.detail-item { background: var(--cream); border-radius: 10px; padding: 10px 13px; }
.detail-key { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
.detail-val { font-size: 14px; font-weight: 700; color: var(--text); }

/* EDIT FORM */
.edit-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.edit-field label { font-size: 12px; font-weight: 700; color: var(--viridian); }
.edit-field input, .edit-field select, .edit-field textarea { padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--border); font-family: 'Sarabun',sans-serif; font-size: 14px; outline: none; background: var(--cream); }
.edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus { border-color: var(--blue); background: white; }
.edit-field textarea { min-height: 72px; resize: vertical; }
.btn-save-edit { width: 100%; padding: 12px; background: var(--viridian); color: white; border: none; border-radius: 10px; font-family: 'Sarabun',sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; margin-top: 8px; }

/* REVIEW */
.review-card { background: var(--cream); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.review-stars { color: #f59e0b; font-size: 16px; margin-bottom: 4px; }
.review-text { font-size: 14px; color: var(--text); margin-bottom: 5px; }
.review-date { font-size: 11px; color: var(--muted); }
.add-review { background: white; border-radius: 14px; border: 1.5px solid var(--border); padding: 16px; margin-top: 14px; }
.add-review h4 { font-size: 13px; font-weight: 800; color: var(--viridian); margin-bottom: 12px; }
.star-input { display: flex; gap: 6px; margin-bottom: 10px; }
.star-btn { font-size: 24px; cursor: pointer; opacity: 0.3; transition: opacity 0.15s; }
.star-btn.active { opacity: 1; }

/* PROFILE CARD */
.pc-wrap { background: var(--blue-bg); border-radius: 14px; padding: 16px; }
.pc-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.profile-card { background: white; border-radius: 18px; overflow: hidden; max-width: 340px; margin: 0 auto; border: 1.5px solid var(--border); font-family: 'Sarabun',sans-serif; }
.pc-header { background: #C0D3E7; padding: 20px 18px 14px; text-align: center; flex-shrink: 0; }
.pc-photo { width: 100px; height: 100px; min-width: 100px; min-height: 100px; aspect-ratio: 1; border-radius: 50%; background: var(--blue-light); margin: 0 auto 10px; overflow: hidden; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 34px; flex-shrink: 0; align-self: center; }
.pc-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.pc-name { font-size: 17px; font-weight: 800; color:#135738; }
.pc-prof { font-size: 13px; color:#135738(255,255,255,0.8); margin-top: 3px; }
.pc-license { font-size: 12px; color:#135738(255,255,255,0.9); margin-top: 3px; font-weight: 700; }
.pc-verified { display: inline-flex; align-items: center; gap: 5px; background: #dcfce7; color: #14532d; border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 800; margin-top: 8px; }
.pc-body { padding: 14px 16px; }
.pc-row { margin-bottom: 10px; }
.pc-row-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 4px; }
.pc-row-val { font-size: 13.5px; color: var(--text); font-weight: 600; line-height: 1.5; }
.pc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.pc-tag { background: var(--blue-bg); color: var(--viridian); border-radius: 6px; padding: 2px 8px; font-size: 11.5px; font-weight: 600; }
.pc-criminal-ok { display: inline-flex; align-items: center; gap: 5px; background: #dcfce7; color: #14532d; border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.pc-footer { background: #C0D3E7; padding: 11px 16px; display: flex; align-items: center; gap: 10px;justify-content: center; }
.pc-footer-logo { height: 35px; align-items: center; }
.pc-footer-div { width: 1px; height: 20px; background: rgba(255,255,255,0.4); }
.pc-footer-text { font-size: 12px; color: white; font-style: italic; font-weight: 700;align-items: center; }
.review-block { background: var(--cream); border-radius: 10px; padding: 12px; margin-top: 8px; }
.review-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--stone); }
.review-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.btn-save-profile { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; font-family: 'Sarabun',sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; margin-top: 14px; }

@media (max-width: 600px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
}
</style>

let applicants = [];

let selectedStars = 0;

async function loadData(){
  const snapshot = await window._getDocs(window._collection(window._db,'applicants'));
  applicants = snapshot.docs.map(d=>({...d.data(), _docId: d.id}));
  updateStats(); renderCards();
}

function updateStats(){
  const t=applicants.length;
  document.getElementById('stat-total').textContent=t;
  document.getElementById('stat-wait').textContent=applicants.filter(a=>a.status==='รอตรวจสอบ').length;
  document.getElementById('stat-ok').textContent=applicants.filter(a=>a.status==='อนุมัติแล้ว').length;
  document.getElementById('stat-no').textContent=applicants.filter(a=>a.status==='ไม่ผ่าน').length;
  document.getElementById('badge').textContent=t+' ใบสมัคร';
}

function renderCards(){
  const sf=document.getElementById('filter-status').value;
  const pf=document.getElementById('filter-prof').value;
  const filtered=applicants.filter(a=>{
    if(sf&&a.status!==sf) return false;
    if(pf&&!a.profession.includes(pf.split(' - ')[0])) return false;
    return true;
  });
  const container=document.getElementById('cards');
  const empty=document.getElementById('empty');
  if(!filtered.length){ container.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  container.innerHTML=filtered.map(a=>{
    const idx=applicants.indexOf(a);
    const sc=a.status==='อนุมัติแล้ว'?'s-ok':a.status==='ไม่ผ่าน'?'s-no':'s-wait';
    const ph=a.photo?`<div class="app-photo"><img src="${a.photo}"></div>`:`<div class="app-photo">👤</div>`;
    const stars=a.reviews&&a.reviews.length?Math.round(a.reviews.reduce((s,r)=>s+r.stars,0)/a.reviews.length):0;
    const starsHtml=stars?`<div style="font-size:12px;color:#f59e0b">${'★'.repeat(stars)}${'☆'.repeat(5-stars)} (${a.reviews.length})</div>`:'';
    return `<div class="app-card">
      <div class="app-card-header">${ph}<div>
        <div class="app-name">${a.fname} ${a.lname}</div>
        <div class="app-prof">${a.profession||'—'}</div>
        <div class="app-ref">${a.ref} · ${a.submittedAt}</div>
        ${starsHtml}
      </div></div>
      <div class="app-body">
        <div class="app-row"><span class="app-label">ประสบการณ์</span><span class="app-val">${a.exp||'—'}</span></div>
        <div class="app-row"><span class="app-label">พื้นที่</span><span class="app-val">${a.area||'—'}</span></div>
        <div class="app-row"><span class="app-label">เบอร์</span><span class="app-val">${a.phone||'—'}</span></div>
        <div class="app-row"><span class="app-label">สถานะ</span><span class="status-badge ${sc}">${a.status}</span></div>
      </div>
      <div class="app-footer">
        <button class="btn-view" onclick="openModal(${idx})">ดูรายละเอียด</button>
        <button class="btn-approve" onclick="setStatus(${idx},'อนุมัติแล้ว')">อนุมัติ</button>
        <button class="btn-reject" onclick="setStatus(${idx},'ไม่ผ่าน')">✕</button>
        <button class="btn-reject" onclick="deleteApplicant(${idx})" style="background:#fee2e2;color:#991b1b">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function setStatus(idx,status){ applicants[idx].status=status; save(); updateStats(); renderCards(); }
async function save(){
  const a=applicants[currentIdx];
  if(!a||!a._docId) return;
  const docRef=window._doc(window._db,'applicants',a._docId);
  const {_docId,...data}=a;
  await window._updateDoc(docRef,data);
}

function tagsHtml(arr){ return (arr||[]).map(t=>`<span class="tag">${t}</span>`).join(''); }

function openModal(idx){
  currentIdx=idx; const a=applicants[idx];
  document.getElementById('modal-name').textContent=`${a.fname} ${a.lname} — ${a.ref}`;
  renderInfo(a); renderEdit(a); renderReviews(a); renderProfileCard(a);
  switchTab('info', document.querySelector('.modal-tab'));
  document.getElementById('modal').classList.add('open');
}

function switchTab(name,btn){
  document.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.modal-panel').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

let pendingPhoto = null;

function previewPhoto(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 400;
        let w = img.width, h = img.height;
        if(w > h){ if(w > MAX){ h = h*(MAX/w); w = MAX; } }
        else { if(h > MAX){ w = w*(MAX/h); h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingPhoto = canvas.toDataURL('image/jpeg', 0.7);
        const preview = document.getElementById('photo-preview');
        preview.innerHTML = `<img src="${pendingPhoto}" style="width:100%;height:100%;object-fit:cover">`;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

  a.lname=document.getElementById('e-lname').value;
  a.profession=document.getElementById('e-prof').value;
  a.license=document.getElementById('e-license').value;
  a.exp=document.getElementById('e-exp').value;
  a.area=document.getElementById('e-area').value;
  a.workhistory=document.getElementById('e-workhistory').value;
  a.expertise=document.getElementById('e-expertise').value.split(',').map(s=>s.trim()).filter(Boolean);
  a.exp_type=document.getElementById('e-exptype').value.split(',').map(s=>s.trim()).filter(Boolean);
  a.personality=document.getElementById('e-personality').value.split(',').map(s=>s.trim()).filter(Boolean);
  a.status=document.getElementById('e-status').value;
  if(pendingPhoto){ a.photo = pendingPhoto; pendingPhoto = null; }
  save(); updateStats(); renderCards(); renderProfileCard(a);
  alert('บันทึกแล้วครับ');
}

function renderReviews(a){
  const reviews=a.reviews||[];
  const avgStars=reviews.length?Math.round(reviews.reduce((s,r)=>s+r.stars,0)/reviews.length):0;
  const starIcons=n=>'★'.repeat(n)+'☆'.repeat(5-n);
  document.getElementById('panel-reviews').innerHTML=`
    ${reviews.length?`<div style="margin-bottom:14px"><div style="font-size:24px;color:#f59e0b;font-weight:800">${starIcons(avgStars)} <span style="font-size:14px;color:var(--muted)">(${reviews.length} รีวิว)</span></div></div>`:'<div style="color:var(--muted);margin-bottom:14px;font-size:14px">ยังไม่มีรีวิว</div>'}
    ${reviews.map((r,i)=>`<div class="review-card">
      <div class="review-stars">${starIcons(r.stars)}</div>
      <div class="review-text">${r.text}</div>
      <div class="review-date">${r.date} · ${r.client||'ลูกค้า'}</div>
    </div>`).join('')}
    <div class="add-review">
      <h4>เพิ่มรีวิวใหม่</h4>
      <div class="star-input" id="star-input">
        ${[1,2,3,4,5].map(i=>`<span class="star-btn" onclick="setStar(${i})">★</span>`).join('')}
      </div>
      <div class="edit-field"><label>ชื่อลูกค้า</label><input id="r-client" placeholder="เช่น คุณสมชาย"></div>
      <div class="edit-field"><label>รีวิว</label><textarea id="r-text" placeholder="เช่น ดูแลผู้ป่วยดีมาก ใจเย็น มือเบา..."></textarea></div>
      <button class="btn-save-edit" onclick="addReview()">เพิ่มรีวิว</button>
    </div>`;
  selectedStars=0;
}

function setStar(n){
  selectedStars=n;
  document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('active',i<n));
}

function addReview(){
  if(!selectedStars){ alert('กรุณาเลือกดาว'); return; }
  const text=document.getElementById('r-text').value;
  if(!text){ alert('กรุณากรอกรีวิว'); return; }
  const a=applicants[currentIdx];
  if(!a.reviews) a.reviews=[];
  a.reviews.push({ stars:selectedStars, text, client:document.getElementById('r-client').value, date:new Date().toLocaleDateString('th-TH') });
  save(); renderReviews(a); renderProfileCard(a);
}

  const licenseHtml=isRN&&a.license?`<div class="pc-license">ใบประกอบ เลขที่ ${a.license}</div>`:'';

function saveProfileCard(){
  const card=document.getElementById('pc-card');
  html2canvas(card,{scale:4,backgroundColor:'#fff',useCORS:true}).then(canvas=>{
    const a=applicants[currentIdx];
    const link=document.createElement('a');
    link.download=`profile-${a.fname}-${a.lname}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
  });
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
loadData();


async function deleteApplicant(idx){
  if(!confirm('ยืนยันลบใบสมัครนี้?')) return;
  const a=applicants[idx];
  if(a._docId){
    await window._deleteDoc(window._doc(window._db,'applicants',a._docId));
  }
  applicants.splice(idx,1);
  updateStats(); renderCards();
}

function checkPassword(){
  const correct = "210925";
  const input = prompt("ใส่ Password!");
  if(input !== correct){
    document.body.innerHTML = "<div style='text-align:center;margin-top:200px;font-family:Sarabun,sans-serif;font-size:20px'>รหัสผ่านไม่ถูกต้อง</div>";
  }
}
